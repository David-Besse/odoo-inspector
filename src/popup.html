<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary-color: #7c59a1;
      --text-color: #333;
      --border-color: #e4e6eb;
      --animation-duration: 0.2s;
    }

    @keyframes quickFadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes quickScaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes instantAppear {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideFromLeft {
      0%   { opacity: 0; transform: translateX(-20px); }
      80%  { opacity: 1; transform: translateX(2px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    body {
      width: 220px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text-color);
      background: white;
      opacity: 0;
      animation: instantAppear 0.15s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      animation: quickScaleIn var(--animation-duration) cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .title {
      font-size: 19px;
      font-weight: 600;
      color: var(--primary-color);
      line-height: 1.2;
      opacity: 0;
      animation: quickFadeIn var(--animation-duration) cubic-bezier(0.19, 1, 0.22, 1) 0.05s forwards;
    }

    .powered-by {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
      display: flex;
      align-items: center;
    }

    .sudokeys-logo {
      display: inline-block;
      margin-left: 4px;
      height: 12px;
    }

    .sudokeys-logo img {
      height: 12px;
      width: auto;
      image-rendering: auto;
      transform: translateZ(0);
      -webkit-font-smoothing: antialiased;
      animation: slideFromLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
      opacity: 0;
    }

    /* Sélecteur de mode Debug / Assets */
    .mode-selector {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 0;
      opacity: 0;
      animation: instantAppear 0.15s cubic-bezier(0.19, 1, 0.22, 1) 0.12s forwards;
    }

    .mode-label {
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      transition: color 0.15s;
      user-select: none;
    }

    .mode-label.active {
      color: var(--primary-color);
      font-weight: 600;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
      cursor: pointer;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--primary-color);
      transition: .15s;
      border-radius: 18px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .15s;
      border-radius: 50%;
    }

    input:checked + .slider:before {
      transform: translateX(14px);
    }

    /* Messages d'information */
    .disabled-info {
      display: none;
      color: #666;
      font-style: italic;
      text-align: center;
      margin: 10px auto;
      font-size: 0.9em;
      animation: quickFadeIn 0.3s ease forwards;
      padding: 8px 12px;
      background-color: rgba(0, 0, 0, 0.05);
      border-radius: 6px;
      max-width: 180px;
      line-height: 1.4;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.03);
    }

    .website-info {
      display: none;
      color: #555;
      text-align: center;
      margin: 15px auto;
      font-size: 0.9em;
      animation: quickFadeIn 0.3s ease forwards;
      padding: 10px 15px;
      background-color: rgba(255, 213, 79, 0.15);
      border-radius: 6px;
      max-width: 180px;
      line-height: 1.5;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid rgba(234, 181, 22, 0.1);
    }

    .website-info .icon {
      margin-right: 5px;
      font-size: 0.9em;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-info">
      <span class="title">O<span style="color: #4bb04f;">debug</span></span>
      <div class="powered-by">
        <span class="powered-by-text">Powered by</span>
        <span class="sudokeys-logo">
          <img src="/img/Sudokeys.webp?v=3" alt="Sudokeys" style="image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
        </span>
      </div>
    </div>
  </div>

  <div class="disabled-info" style="display: none;">
    Cette extension n'est utilisable que sur les sites Odoo
  </div>

  <div class="website-info" style="display: none;">
    <span class="icon">ℹ️</span> Le mode debug ne peut être activé que sur les pages du backoffice.
  </div>

  <div class="mode-selector" id="mode-selector">
    <span class="mode-label active" id="label-debug">Debug</span>
    <label class="switch">
      <input type="checkbox" id="mode-toggle">
      <span class="slider"></span>
    </label>
    <span class="mode-label" id="label-assets">Assets</span>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
